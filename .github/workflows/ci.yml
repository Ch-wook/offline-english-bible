name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  analyze_and_test:
    name: Analyze & Test (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Drift code
        timeout-minutes: 5
        run: |
          dart run build_runner build \
            --build-filter=lib/core/database/app_database.g.dart
          git diff --exit-code -- lib/core/database/app_database.g.dart

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: frontend/coverage/lcov.info
          flags: flutter
        continue-on-error: true

  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze_and_test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Drift code
        timeout-minutes: 5
        run: |
          dart run build_runner build \
            --build-filter=lib/core/database/app_database.g.dart
          git diff --exit-code -- lib/core/database/app_database.g.dart

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: offline-bible-debug.apk
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
