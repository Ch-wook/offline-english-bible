name: offline_english_bible
description: Offline English Bible learning platform - read, study, and grow in English through the Bible.
publish_to: 'none'
version: 2.2.2+7

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────
  flutter_riverpod: ^2.6.1

  # ── Navigation ────────────────────────────────────────────────
  go_router: ^14.6.2

  # ── Database ──────────────────────────────────────────────────
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.26   # Android + iOS native SQLite
  path_provider: ^2.1.4
  path: ^1.9.1

  # ── Settings Storage ──────────────────────────────────────────
  hive_flutter: ^1.1.0

  # ── Utils ─────────────────────────────────────────────────────
  equatable: ^2.0.7
  flutter_tts: ^4.2.5
  package_info_plus: ^10.2.0
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.15.1
  drift_dev: ^2.22.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/databases/
    - assets/data/
#    - assets/images/
#    - assets/icons/

