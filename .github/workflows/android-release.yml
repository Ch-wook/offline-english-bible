name: Android Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.0.0'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build_release_apk:
    name: Build and Upload APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
            version="${version//+/-}"
            echo "tag=v${version}-build-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare APK asset
        shell: bash
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk \
            "release/offline-english-bible-${{ steps.release.outputs.tag }}.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: offline-english-bible-${{ steps.release.outputs.tag }}.apk
          path: frontend/release/offline-english-bible-${{ steps.release.outputs.tag }}.apk
          retention-days: 30

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "release/offline-english-bible-${RELEASE_TAG}.apk" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              "release/offline-english-bible-${RELEASE_TAG}.apk" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Offline English Bible ${RELEASE_TAG}" \
              --notes "Install the attached APK on Android."
          fi
